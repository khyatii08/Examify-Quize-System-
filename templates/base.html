<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Examify{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* ===== BODY & BACKGROUND ===== */
        body {
            background: #f4f6f9; /* Light neutral background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            background: linear-gradient(135deg, #141e30, #243b55);
        }

        .navbar-brand {
            color: white !important;
            font-weight: bold;
            font-size: 22px;
            letter-spacing: 1px;
        }

        .nav-link {
            color: white !important;
            margin-left: 15px;
            position: relative;
            transition: color 0.3s;
        }

        /* Hover underline animation */
        .nav-link::after {
            content: "";
            position: absolute;
            width: 0;
            height: 2px;
            display: block;
            background: #ffc107; /* underline color */
            transition: width 0.3s;
            bottom: 0;
            left: 0;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* Active page underline */
        .nav-link.active {
            color: #ffc107 !important;
        }

        .nav-link.active::after {
            width: 100%;
        }

        /* ===== CARDS / PAGE CONTENT ===== */
        .card-custom {
            background: white;
            border: none;
            border-radius: 15px;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            padding: 20px;
        }

        .card-custom:hover {
            transform: translateY(-8px);
        }

        /* ===== BUTTONS ===== */
        .btn-custom {
            background: #243b55;
            color: white;
            border-radius: 8px;
        }

        .btn-custom:hover {
            background: #2c5fbd;
        }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: 80px;
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand">🎓 Examify</a>

    <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
            <li class="nav-item">
                <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if request.path == '/about' %}active{% endif %}" href="/about">About</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if request.path == '/contact' %}active{% endif %}" href="/contact">Contact</a>
            </li>

            {% if session.get('username') %}
                <li class="nav-item">
                    <a class="nav-link text-warning" href="/dashboard">
                        Welcome, {{ session['username'] }}
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-danger" href="/logout">
                        Logout
                    </a>
                </li>
            {% else %}
                <li class="nav-item">
                    <a class="nav-link" href="/login">Login</a>
                </li>
            {% endif %}
        </ul>
    </div>
  </div>
</nav>

<!-- ===== PAGE CONTENT ===== -->
<div class="container mt-5">
    <div class="card-custom">
        {% block content %}
        {% endblock %}
    </div>
</div>

<!-- ===== FOOTER ===== -->
<div class="footer">
    © 2026 Examify | Online Quiz & Assessment System
</div>

</body>
</html>
