<!DOCTYPE html>
<html>
<head>
    <title>Login | Examify</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* ===== BODY / BACKGROUND ===== */
        body {
            background: linear-gradient(135deg, #141e30, #243b55); /* match register page */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }

        /* ===== LOGIN CARD ===== */
        .login-card {
            width: 420px;
            border: none;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            background: #ffffff; /* white card for contrast */
            padding: 30px;
            color: #141e30;
        }

        .login-card h3 {
            font-weight: bold;
        }

        .login-card p {
            color: #6c757d; /* muted text */
        }

        /* ===== FORM INPUTS ===== */
        .form-control {
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        /* ===== BUTTON ===== */
        .btn-custom {
            background: #243b55;
            color: white;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: #2c5fbd;
            color: white;
        }

        /* ===== LINKS ===== */
        a {
            text-decoration: none;
            color: #243b55;
            transition: 0.3s;
        }

        a:hover {
            color: #2c5fbd;
        }

        /* ===== ALERT ===== */
        .alert {
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="card login-card">
    <h3 class="text-center mb-3">Welcome Back 👋</h3>
    <p class="text-center text-muted">Login to continue</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-danger">
            {{ messages[0] }}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" name="username" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" required>
        </div>

        <button type="submit" class="btn btn-custom w-100">Login</button>
    </form>

    <div class="text-center mt-3">
        <small>Don't have an account? 
            <a href="/register">Create Account</a>
        </small>
    </div>
</div>

</body>
</html>
