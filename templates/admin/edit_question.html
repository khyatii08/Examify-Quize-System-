{% extends "admin/base.html" %}
{% block content %}

<h2>Edit Question</h2>

<form method="POST">

    <label>Subject</label>
    <input type="text"
           name="subject_id"
           value="{{ question.subject_id }}"
           class="form-control"
           required>

    <label style="margin-top:15px;">Question</label>
    <input type="text"
           name="question"
           value="{{ question.question }}"
           class="form-control"
           required>

    <div class="form-grid" style="margin-top:15px;">
        <input type="text" name="option1" value="{{ question.option1 }}" required class="form-control">
        <input type="text" name="option2" value="{{ question.option2 }}" required class="form-control">
        <input type="text" name="option3" value="{{ question.option3 }}" required class="form-control">
        <input type="text" name="option4" value="{{ question.option4 }}" required class="form-control">
    </div>

    <label style="margin-top:15px;">Correct Answer</label>
    <input type="text"
           name="correct_answer"
           value="{{ question.correct_answer }}"
           class="form-control"
           required>

    <button type="submit" class="btn btn-success" style="margin-top:20px;">
        Update Question
    </button>

</form>

{% endblock %}
