<!DOCTYPE html>
<html>
<head>
    <title>Admin Certificate View</title>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            flex-direction: column;
        }

        .certificate-wrapper {
            background: #ffffff;
            width: 100%;
            max-width: 1000px;
            padding: 60px;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            border: 3px solid #d4af37;
        }

        .certificate-wrapper::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border: 3px double #2c3e50;
        }

        .content {
            text-align: center;
        }

        .logo-area {
            font-size: 50px;
            color: #2c3e50;
        }

        .header-title {
            font-family: 'Great Vibes', cursive;
            font-size: 65px;
            color: #2c3e50;
            margin: 0;
        }

        .sub-header {
            font-size: 16px;
            letter-spacing: 3px;
            color: #7f8c8d;
            text-transform: uppercase;
            margin-top: 5px;
            border-bottom: 2px solid #d4af37;
            display: inline-block;
            padding-bottom: 5px;
        }

        .user-name {
            font-size: 42px;
            font-weight: 700;
            margin: 20px 0;
            text-transform: uppercase;
        }

        .seal {
            position: absolute;
            bottom: 80px;
            right: 80px;
            width: 140px;
            height: 140px;
            border: 5px solid #c0392b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: bold;
            color: #c0392b;
            background: rgba(255,255,255,0.9);
            transform: rotate(-15deg);
        }

        .admin-btn {
            margin-top: 30px;
        }

        .btn-back {
            background: #2c3e50;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
        }

        @media print {
            body { background: white; }
            .certificate-wrapper { box-shadow: none; }
            .admin-btn { display: none; }
        }
    </style>
</head>

<body>

<div class="certificate-wrapper">

    <div class="content">
        <div class="logo-area">
            <i class="fas fa-award"></i>
        </div>

        <h1 class="header-title">Certificate of Completion</h1>
        <div class="sub-header">Admin View</div>

        <p>This certificate is proudly presented to</p>

        <div class="user-name">{{ result.username }}</div>

        <p>
            For successfully completing the examination in<br>
            <strong>{{ result.subject_name }}</strong>
        </p>

        <p style="margin-top:20px; font-size:18px;">
            Score: <strong>{{ result.score }} / {{ result.total }}</strong>
        </p>
    </div>

    <div class="seal">
        ADMIN<br>VERIFIED
    </div>

</div>

<div class="admin-btn">
    <a href="{{ url_for('manage_results') }}" class="btn-back">
        ← Back to Manage Results
    </a>
</div>

</body>
</html>
